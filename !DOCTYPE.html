<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哪個位值比較大？</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'LiHei Pro', sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 600px;
            position: relative;
        }
        h1 { color: #2c3e50; }
        .input-group { margin: 20px 0; }
        input[type="text"] {
            padding: 12px;
            font-size: 18px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            width: 80%;
            text-align: center;
        }
        button.start-btn, button.reset-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            margin: 10px;
        }
        button.start-btn:hover, button.reset-btn:hover { background-color: #2980b9; }
        button.start-btn:active, button.reset-btn:active { transform: scale(0.95); }
        
        .footer-text {
            margin-top: 30px;
            font-size: 14px;
            color: #7f8c8d;
        }
        .hidden { display: none; }
        
        /* 測驗資訊列 */
        .info-bar {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #eee;
        }
        .question-text {
            font-size: 28px;
            margin: 30px 0;
            font-weight: bold;
            color: #2c3e50;
        }
        
        /* 左右排列的選項容器 */
        #options-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        /* 選項按鈕 (加入 position: relative 以便定位打勾符號) */
        .option-btn {
            position: relative; 
            flex: 1;
            background-color: #f1c40f;
            color: #2c3e50;
            font-size: 32px;
            font-weight: bold;
            padding: 50px 20px;
            margin: 0;
            border: none;
            border-radius: 15px;
            box-shadow: 0 6px 0 #d4ac0d;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .option-btn:hover:not(:disabled) { 
            background-color: #f39c12; 
        }
        .option-btn:active:not(:disabled) {
            transform: translateY(6px);
            box-shadow: 0 0 0 #d4ac0d;
        }
        
        /* 答對與答錯的樣式 */
        .correct { 
            background-color: #2ecc71 !important; 
            color: white !important; 
            box-shadow: 0 6px 0 #27ae60 !important; 
        }
        .wrong { 
            background-color: #e74c3c !important; 
            color: white !important; 
            box-shadow: 0 6px 0 #c0392b !important; 
        }

        /* ★ 新增：打勾與打叉的符號設計 ★ */
        .correct::after {
            content: '✔';
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 40px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .wrong::after {
            content: '✖';
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 40px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        /* 結果頁面 */
        .score-text {
            font-size: 48px;
            color: #e74c3c;
            margin: 20px 0;
            font-weight: bold;
        }
        .time-text { font-size: 20px; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div id="start-screen" class="container">
        <h1>哪個位值比較大？</h1>
        <div class="input-group">
            <input type="text" id="player-name" placeholder="請輸入姓名" required>
        </div>
        <button class="start-btn" onclick="startGame()">開始測驗</button>
        <div class="footer-text">張雯秋老師設計</div>
    </div>

    <div id="quiz-screen" class="container hidden">
        <div class="info-bar">
            <span id="player-display"></span>
            <span id="question-progress"></span>
            <span>⏱ <span id="timer-display">0</span> 秒</span>
        </div>
        <div class="question-text">請問哪一個位值比較大？</div>
        <div id="options-container">
            </div>
    </div>

    <div id="result-screen" class="container hidden">
        <h1 id="congrats-text">恭喜完成測驗！</h1>
        <div class="score-text">得分：<span id="final-score"></span> 分</div>
        <div class="time-text">總共花費：<span id="final-time"></span> 秒</div>
        <button class="reset-btn" onclick="resetGame()">重新測驗</button>
        <div class="footer-text">張雯秋老師設計</div>
    </div>

    <script>
        // 題庫設定
        const questionPool = [
            { opt1: "個位", opt2: "十位", ans: "十位" },
            { opt1: "萬位", opt2: "千位", ans: "萬位" },
            { opt1: "百位", opt2: "千位", ans: "千位" },
            { opt1: "個位", opt2: "十分位", ans: "個位" },
            { opt1: "千分位", opt2: "百分位", ans: "百分位" },
            { opt1: "百億位", opt2: "億位", ans: "百億位" },
            { opt1: "百萬位", opt2: "十億位", ans: "十億位" },
            { opt1: "十位", opt2: "百分位", ans: "十位" },
            { opt1: "十分位", opt2: "百分位", ans: "十分位" },
            { opt1: "百分位", opt2: "千分位", ans: "百分位" },
            { opt1: "千分位", opt2: "萬分位", ans: "千分位" },
            { opt1: "千位", opt2: "萬位", ans: "萬位" },
            { opt1: "百位", opt2: "千位", ans: "千位" },
            { opt1: "十位", opt2: "十分位", ans: "十位" },
            { opt1: "千位", opt2: "千分位", ans: "千位" }
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let timeElapsed = 0;
        let timerInterval;
        let playerName = "";

        // 洗牌演算法
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function startGame() {
            const nameInput = document.getElementById("player-name").value.trim();
            if (!nameInput) {
                alert("請先輸入姓名才能開始測驗喔！");
                return;
            }
            playerName = nameInput;
            
            const shuffledPool = shuffle([...questionPool]);
            currentQuestions = shuffledPool.slice(0, 10);
            
            currentIndex = 0;
            score = 0;
            timeElapsed = 0;
            
            document.getElementById("start-screen").classList.add("hidden");
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("player-display").innerText = playerName;
            
            timerInterval = setInterval(() => {
                timeElapsed++;
                document.getElementById("timer-display").innerText = timeElapsed;
            }, 1000);

            loadQuestion();
        }

        function loadQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById("question-progress").innerText = `第 ${currentIndex + 1} / 10 題`;
            
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";

            const options = shuffle([q.opt1, q.opt2]);

            options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, q.ans, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct, btnElement) {
            const allBtns = document.querySelectorAll(".option-btn");
            // 停用按鈕，避免重複點擊
            allBtns.forEach(b => b.disabled = true);

            if (selected === correct) {
                score += 10;
                btnElement.classList.add("correct"); // 觸發打勾和綠色
            } else {
                btnElement.classList.add("wrong"); // 觸發打叉和紅色
                // 同時把正確答案標示出來
                allBtns.forEach(b => {
                    if (b.innerText === correct) b.classList.add("correct");
                });
            }

            // 稍微停頓 1.2 秒讓學生看清楚打勾/打叉再跳下一題
            setTimeout(() => {
                currentIndex++;
                if (currentIndex < 10) {
                    loadQuestion();
                } else {
                    endGame();
                }
            }, 1200);
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById("quiz-screen").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");
            
            document.getElementById("congrats-text").innerText = `恭喜 ${playerName} 完成測驗！`;
            document.getElementById("final-score").innerText = score;
            document.getElementById("final-time").innerText = timeElapsed;
        }

        function resetGame() {
            document.getElementById("result-screen").classList.add("hidden");
            document.getElementById("start-screen").classList.remove("hidden");
            document.getElementById("player-name").value = "";
            document.getElementById("timer-display").innerText = "0";
        }
    </script>
</body>
</html>
